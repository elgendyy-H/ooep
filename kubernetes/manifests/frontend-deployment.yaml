
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oepp-frontend
  namespace: oepp
  labels:
    app: oepp
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oepp
      component: frontend
  template:
    metadata:
      labels:
        app: oepp
        component: frontend
    spec:
      containers:
      - name: frontend
        image: oepp/frontend:latest
        ports:
        - containerPort: 80
        env:
        - name: REACT_APP_API_URL
          value: "https://oepp.example.com/api"
        - name: REACT_APP_WS_URL
          value: "wss://oepp.example.com/ws"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
