
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oepp-backend
  namespace: oepp
  labels:
    app: oepp
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oepp
      component: backend
  template:
    metadata:
      labels:
        app: oepp
        component: backend
    spec:
      containers:
      - name: backend
        image: oepp/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: oepp-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: oepp-secrets
              key: redis-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: oepp-secrets
              key: secret-key
        - name: DEBUG
          value: "false"
        - name: CORS_ORIGINS
          value: "https://oepp.example.com"
        - name: ALLOWED_HOSTS
          value: "oepp.example.com"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: oepp-backend-data
