
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oepp-worker
  namespace: oepp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oepp
      component: worker
  template:
    metadata:
      labels:
        app: oepp
        component: worker
    spec:
      containers:
      - name: worker
        image: oepp/backend:latest
        command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: oepp-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: oepp-secrets
              key: redis-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: oepp-secrets
              key: secret-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: oepp-backend-data
