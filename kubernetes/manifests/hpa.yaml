
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: oepp-backend-hpa
  namespace: oepp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: oepp-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: oepp-worker-hpa
  namespace: oepp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: oepp-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
